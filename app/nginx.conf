# Serves the built SPA and proxies /api to the FastAPI container, so the
# dashboard is same-origin and needs no runtime configuration.
server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # SPA fallback: client-side routes (/event/..., /signals) resolve to index.html.
    location / {
        try_files $uri /index.html;
    }
}

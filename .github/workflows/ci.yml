name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: markets
          POSTGRES_PASSWORD: markets
          POSTGRES_DB: markets
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U markets -d markets"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements-dev.txt
      - name: Lint (ruff)
        run: ruff check .
      - name: Unit + API tests
        env:
          TEST_POSTGRES_DSN: postgresql://markets:markets@localhost:5432/markets
        run: pytest

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json
      - run: npm ci
      - name: Lint (oxlint)
        run: npm run lint
      - name: Type-check + build
        run: npm run build
